services:
  web:
    container_name: ${WEB_HOST}
    build: 
      context: .
      dockerfile: Dockerfile
      args:
        - WEB_IMAGE_TAG=${WEB_IMAGE_TAG}
    depends_on:
      - db
    ports:
      - "${WEB_PORT}:8069"
      - "${GEVENT_PORT}:8072"
    restart: always
    volumes:
      - ./filestore:/var/lib/odoo
      - ./config:/etc/odoo
      - ./addons:/mnt/extra-addons
      - ~/addons-common:/mnt/extra-addons-common
      - ./log:/var/log/odoo
    command:
      - /usr/bin/odoo
    networks:
      - networks1
  db:
    container_name: ${DB_HOST}
    image: ${DB_IMAGE}:${DB_TAG}
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_PASSWORD=${DB_PASSWD}
      - POSTGRES_USER=${DB_USER}
      - PGDATA=/var/lib/postgresql/data/pgdata
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - odoo-db-data:/var/lib/postgresql/data/pgdata
volumes:
  odoo-db-data:
networks:
  networks1:
    name: odoo